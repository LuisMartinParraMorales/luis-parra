name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - preview-dev

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, build, and UI smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: UI smoke tests
        run: npm run test:ui
